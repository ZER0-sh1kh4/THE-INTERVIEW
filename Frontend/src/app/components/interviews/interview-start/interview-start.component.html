<!-- Interview setup page adapted from the provided UI reference and dashboard theme. -->
<app-user-navbar></app-user-navbar>

<aside class="side-label">SESSION CONFIGURATION - 2026.V1</aside>

<main class="setup-shell">
  <header class="setup-header">
    <span class="label-caps text-gold">Step 01 / Setup</span>
    <h1 class="font-editorial">Define the <br /><i>Parameters</i></h1>
    <div class="header-rule"></div>
  </header>

  <form class="setup-form" #interviewForm="ngForm" (ngSubmit)="startInterview()">
    <div class="field field-wide">
      <label class="label-caps">Job Role</label>
      <input
        name="role"
        [(ngModel)]="form.role"
        (ngModelChange)="onConfigChange()"
        required
        type="text"
        placeholder="e.g. Senior Software Architect"
        class="editorial-input"
      />
    </div>

    <section class="field">
      <label class="label-caps">Experience Level</label>
      <label class="choice-row" *ngFor="let level of experienceLevels">
        <input type="radio" name="experience" [(ngModel)]="form.experience" [value]="level" (change)="onConfigChange()" />
        <span class="choice-box"></span>
        <span>{{ level }}</span>
      </label>
    </section>

    <section class="field">
      <label class="label-caps">Interview Type</label>
      <button
        type="button"
        class="type-card"
        *ngFor="let type of interviewTypes"
        [class.selected]="form.interviewType === type"
        (click)="form.interviewType = type; onConfigChange()"
      >
        {{ type === 'HR' ? 'HR / Behavioral' : type === 'Mixed' ? 'Mixed Session' : 'Technical' }}
        <span class="material-symbols-outlined">{{ type === 'Technical' ? 'code' : type === 'HR' ? 'person' : 'layers' }}</span>
      </button>
    </section>

    <section class="field field-wide">
      <label class="label-caps">Tech Stack / Skills</label>
      <div class="chip-row">
        <button
          type="button"
          class="skill-chip"
          *ngFor="let skill of techOptions"
          [class.selected]="form.techStack.includes(skill)"
          (click)="toggleTech(skill)"
        >
          {{ skill }}
        </button>
      </div>
      <div class="custom-skill">
        <input
          name="customSkill"
          [(ngModel)]="customSkill"
          type="text"
          placeholder="Add custom skill"
          (keyup.enter)="addCustomSkill()"
        />
        <button type="button" class="add-chip label-caps" (click)="addCustomSkill()">
          <span class="material-symbols-outlined">add</span>
          Add Custom
        </button>
      </div>
    </section>

    <section class="field field-wide split-row">
      <div>
        <label class="label-caps">Difficulty Level</label>
        <div class="segment-row">
          <button
            type="button"
            *ngFor="let level of difficulties"
            [class.selected]="form.difficulty === level"
            (click)="form.difficulty = level; onConfigChange()"
          >
            {{ level }}
          </button>
        </div>
      </div>

      <div>
        <label class="label-caps">No. of Questions</label>
        <div class="select-wrap">
          <select name="numberOfQuestions" [(ngModel)]="form.numberOfQuestions" (change)="onConfigChange()">
            <option *ngFor="let count of questionCounts" [ngValue]="count">{{ count }} Questions</option>
          </select>
          <span class="material-symbols-outlined">expand_more</span>
        </div>
      </div>
    </section>

    <div class="info-box" *ngIf="infoMsg">{{ infoMsg }}</div>
    <div class="error-box" *ngIf="errorMsg">{{ errorMsg }}</div>

    <div class="action-row field-wide">
      <button type="submit" class="start-button label-caps" [disabled]="isLoading || interviewForm.invalid">
        <span>{{ isLoading ? 'Creating Interview...' : 'Start Interview' }}</span>
        <span class="material-symbols-outlined" [class.spin]="isLoading">refresh</span>
      </button>
      <p class="estimate label-caps">Estimated Duration: 45 Minutes</p>
    </div>
  </form>
</main>

<footer class="setup-footer">
  <span class="label-caps">&#169; 2026 THE INTERVIEW - ALL RIGHTS RESERVED</span>
  <div>
    <a>Privacy</a>
    <a>System Status</a>
  </div>
</footer>
